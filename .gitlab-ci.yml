image: cirrusci/flutter:3.7.0

stages:
  - build
  - test

build_android:
  stage: build
  script:
    - echo 'Building mobile Snowledge...'
    - pwd && ls
    - cd '.\Mobile snowledge'
    - pwd && ls
    - flutter packages get
    - flutter build apk --release

test:
  stage: test
  script:
    - pwd && ls
    - echo 'Running integration test'
    - flutter test integration_test
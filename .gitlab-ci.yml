stages:
  - lint
  - test
  - coverage

default:
  image: greycastle/flutter:3.7.0

cache:
  paths:
    - /flutter/bin/cache/dart-sdk

lint:
  stage: lint
  script:
    - flutter analyze

test:
  stage: test
  script:
    - cd 'Mobile snowledge/mobile_app'
    - pub global activate junitreport
    - export PATH="$PATH":"$HOME/.pub-cache/bin"
    - flutter pub get
    - flutter test --coverage --machine | tojunit > testreport.xml
  artifacts:
    reports:
      junit: testreport.xml
    paths:
      - coverage

coverage:
  stage: coverage
  script:
    - genhtml coverage/lcov.info --output=coverage
    - mv coverage/ public/
  artifacts:
    paths:
      - public
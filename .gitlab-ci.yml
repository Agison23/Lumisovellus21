image: cirrusci/flutter:3.7.0

stages:
  - build
  - test

# Install CMake for the testing environment
before_script:
  - apt-get update -qy
  - apt-get install -y cmake

build_android:
  stage: build
  script:
    - echo 'Building mobile Snowledge...'
    - cd 'Mobile snowledge/mobile_app'
    - flutter packages get
    - flutter build apk --release

test:
  stage: test
  script:
    - cd 'Mobile snowledge/mobile_app'
    - echo 'Running integration test'
    - flutter test integration_test
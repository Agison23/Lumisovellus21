services:
  # MySQL service restored to host port 3306
  mysql:
    image: mysql:8.0
    container_name: lumisovellus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lumisovellus
      MYSQL_USER: lumisovellus
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306" 
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend service restored to host port 3001
  backend:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.backend
      # IMPORTANT: Use the 'deps' stage for development, as it has npm and node_modules,
      # but not the final stripped-down 'runner' image.
      target: deps 
    container_name: lumisovellus-backend
    environment:
      DATABASE_URL: mysql://lumisovellus:password@mysql:3306/lumisovellus
      PORT: 3001
      NODE_ENV: development
      # CORS_ORIGIN updated to original frontend host port 3000
      CORS_ORIGIN: http://localhost:3000 
      JWT_SECRET: dev-secret-key
    ports:
      - "3001:3001" 
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      # Bind mount the app source
      - ../../apps/backend:/app
      # Anonymous volume for node_modules (prevents host node_modules from overwriting)
      - /app/node_modules
    # Updated command to be non-interactive
    command: sh -c "npx prisma generate && npx prisma migrate dev --name init && npm run db:seed && npm run build:swagger:clean && npm run dev:full"

volumes:
  mysql_data:


name: Push -> branch

on:
  push:
    branches:
      - "**"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    uses: ./.github/workflows/ci-reusable.yml
    with:
      coverage-threshold: 70
      run-build: true
      run-security-checks: true
      audit-level: "high"
      run-smoke-e2e: true
    secrets: inherit
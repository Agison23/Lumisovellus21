name: Push -> branch

on:
  push:
    branches:
      - "**"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    uses: ./.github/workflows/ci-reusable.yml
    with:
      coverage-threshold: 70
      audit-level: "critical"
    secrets: inherit
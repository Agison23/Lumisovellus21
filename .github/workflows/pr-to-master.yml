name: PR -> master

on:
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rc:
    uses: ./.github/workflows/ci-reusable.yml
    with:
      coverage-threshold: 80
      run-build: true
      run-heavy-lint: true
      run-security-checks: true
      audit-level: "high"
      run-smoke-e2e: true
    secrets: inherit
name: Backend Tests (Simple)

on:
  push:
    branches: [main, develop, backend-branch]
  pull_request:
    branches: [main, develop, backend-branch]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        command: --default-authentication-plugin=mysql_native_password

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Setup test database
        working-directory: apps/backend
        run: |
          # Wait for MySQL to be ready
          timeout 60 bash -c 'until mysqladmin ping -h localhost -u root -ptestpassword --silent; do sleep 2; done'

          # Setup test environment
          echo 'DATABASE_URL="mysql://root:testpassword@localhost:3306/testdb"
          NODE_ENV=test
          PORT=3001
          JWT_SECRET=test_jwt_secret_key_for_testing_only' > .env.test

          # Push database schema
          npx prisma db push

      - name: Run all tests
        working-directory: apps/backend
        run: npm run test:db

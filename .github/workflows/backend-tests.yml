name: Backend Tests

on:
  push:
    branches: [main, develop, backend-branch]
  pull_request:
    branches: [main, develop, backend-branch]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost --silent"
          --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Setup test database
        working-directory: apps/backend
        run: |
          # Wait for MySQL to be ready
          timeout 60 bash -c 'until mysqladmin ping -h localhost -u root -ptestpassword --silent; do sleep 2; done'
          
          # Setup test environment
          echo "DATABASE_URL=mysql://root:testpassword@localhost:3306/testdb" > .env.test
          echo "NODE_ENV=test" >> .env.test
          echo "PORT=3001" >> .env.test
          echo "JWT_SECRET=test_jwt_secret_key_for_testing_only" >> .env.test
          
          # Push database schema
          npx prisma db push

      - name: Run linting
        working-directory: apps/backend
        run: npm run lint

      - name: Run type checking
        working-directory: apps/backend
        run: npm run typecheck

      - name: Run tests with coverage
        working-directory: apps/backend
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: apps/backend/coverage/lcov.info
          delete-old-comments: true

  test-docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Run tests with Docker
        working-directory: apps/backend
        run: npm run test:docker

  security-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Run security audit
        working-directory: apps/backend
        run: npm audit --audit-level=high

      - name: Run dependency check
        working-directory: apps/backend
        run: npx audit-ci --config audit-ci.json
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [test, security-audit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Build application
        working-directory: apps/backend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: backend-build-${{ github.sha }}
          path: apps/backend/dist/
          retention-days: 7

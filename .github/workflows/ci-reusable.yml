name: Reusable CI

on:
  workflow_call:
    inputs:
      coverage-threshold:
        type: number
        default: 70
      run-build:
        type: boolean
        default: false
      run-heavy-lint:
        type: boolean
        default: false
      audit-level:
        type: string
        default: 'critical'
      run-security-checks:
        type: boolean
        default: false
      run-smoke-e2e:
        type: boolean
        default: false
      run-mobile-tests:
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            apps/backend
            apps/web
            apps/mobile
            packages
            infra
            turbo.json
            package.json
            package-lock.json
            .nvmrc
            .turboignore
            .gitleaks.toml

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Flutter (stable channel)
        if: ${{ env.ACT != 'true' }}
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.35.6'
          cache: false

      - name: Mock Flutter setup (local act)
        if: ${{ env.ACT == 'true' }}
        run: |
          echo "Simulating Flutter setup under act"
          mkdir -p /usr/local/bin
          echo -e '#!/bin/bash\necho Flutter 3.35.6-stable' > /usr/local/bin/flutter
          chmod +x /usr/local/bin/flutter
          echo -e '#!/bin/bash\necho Dart 3.6.0' > /usr/local/bin/dart
          chmod +x /usr/local/bin/dart

      - name: Check Flutter & Dart version
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: |
          set -e
          npm ci --prefer-offline --no-audit --fund=false
          npx turbo run pubget

      - name: Install Playwright browsers (ACT)
        if: ${{ env.ACT == 'true' }}
        run: npx playwright install --with-deps

      - name: Generate OpenAPI & clients
        run: npm run openapi:check

      - name: Verify generated OpenAPI clients are committed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted OpenAPI/client changes detected. Commit the generated files."
            git status --porcelain
            exit 0
          fi

      - name: Lint (fast)
        run: npx turbo run lint --filter='!mobile'

      - name: Lint (heavy)
        if: ${{ inputs.run-heavy-lint }}
        run: npm run lint:heavy

      - name: Create Next type shim for typecheck
        run: |
          set -eu
          f=apps/web/next-env.d.ts
          if [ ! -f "$f" ]; then
            printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > "$f"
          fi

      - name: Typecheck
        run: npm run typecheck -- --force

  build:
    runs-on: ubuntu-22.04
    needs: validate
    if: ${{ inputs.run-build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            apps/backend
            apps/web
            apps/mobile
            packages
            infra
            turbo.json
            package.json
            package-lock.json
            .nvmrc
            .turboignore
            .gitleaks.toml

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Flutter (stable channel)
        if: ${{ env.ACT != 'true' }}
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.35.6'
          cache: false

      - name: Mock Flutter setup (local act)
        if: ${{ env.ACT == 'true' }}
        run: |
          echo "Simulating Flutter setup under act"
          mkdir -p /usr/local/bin
          echo -e '#!/bin/bash\necho Flutter 3.35.6-stable' > /usr/local/bin/flutter
          chmod +x /usr/local/bin/flutter
          echo -e '#!/bin/bash\necho Dart 3.6.0' > /usr/local/bin/dart
          chmod +x /usr/local/bin/dart

      - name: Check Flutter & Dart version
        run: |
          flutter --version
          dart --version

      - run: npm ci --prefer-offline --no-audit --fund=false

      - name: Install Playwright browsers (ACT)
        if: ${{ env.ACT == 'true' }}
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build

  test:
    runs-on: ubuntu-22.04
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            apps/backend
            apps/web
            apps/mobile
            packages
            infra
            turbo.json
            package.json
            package-lock.json
            .nvmrc
            .turboignore
            .gitleaks.toml

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Flutter (stable channel)
        if: ${{ env.ACT != 'true' }}
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.35.6'
          cache: false

      - name: Mock Flutter setup (local act)
        if: ${{ env.ACT == 'true' }}
        run: |
          echo "Simulating Flutter setup under act"
          mkdir -p /usr/local/bin
          echo -e '#!/bin/bash\necho Flutter 3.35.6-stable' > /usr/local/bin/flutter
          chmod +x /usr/local/bin/flutter
          echo -e '#!/bin/bash\necho Dart 3.6.0' > /usr/local/bin/dart
          chmod +x /usr/local/bin/dart

      - name: Check Flutter & Dart version
        run: |
          flutter --version
          dart --version

      - run: npm ci --prefer-offline --no-audit --fund=false

      - name: Install Playwright browsers (ACT)
        if: ${{ env.ACT == 'true' }}
        run: npx playwright install --with-deps

      - name: Test (backend + web only)
        run: npm run test:unit -- --filter='!mobile'

      - name: Enforce coverage gate (${{ inputs.coverage-threshold }}%)
        run: echo "Check test coverage"

  mobile-tests:
    runs-on: ubuntu-22.04
    needs: validate
    if: ${{ inputs.run-mobile-tests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            apps/mobile
            packages
            turbo.json
            package.json
            package-lock.json

      - name: Setup Flutter (stable channel)
        if: ${{ env.ACT != 'true' }}
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.35.6'
          cache: false

      - name: Mock Flutter setup (local act)
        if: ${{ env.ACT == 'true' }}
        run: |
          echo "Simulating Flutter setup under act"
          mkdir -p /usr/local/bin
          echo -e '#!/bin/bash\necho Flutter 3.35.6-stable' > /usr/local/bin/flutter
          chmod +x /usr/local/bin/flutter
          echo -e '#!/bin/bash\necho Dart 3.6.0' > /usr/local/bin/dart
          chmod +x /usr/local/bin/dart

      - name: Check Flutter & Dart version
        run: |
          flutter --version
          dart --version

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run Flutter tests
        working-directory: apps/mobile
        run: flutter test --coverage

      - name: Upload mobile coverage
        uses: codecov/codecov-action@v4
        if: ${{ github.event_name == 'pull_request' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/mobile/coverage/lcov.info
          flags: mobile
          name: mobile-coverage
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-22.04
    needs: validate
    if: ${{ inputs.run-security-checks }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            apps/backend
            apps/web
            apps/mobile
            packages
            infra
            turbo.json
            package.json
            package-lock.json
            .nvmrc
            .turboignore
            .gitleaks.toml

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Flutter (stable channel)
        if: ${{ env.ACT != 'true' }}
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.35.6'
          cache: false

      - name: Mock Flutter setup (local act)
        if: ${{ env.ACT == 'true' }}
        run: |
          echo "Simulating Flutter setup under act"
          mkdir -p /usr/local/bin
          echo -e '#!/bin/bash\necho Flutter 3.35.6-stable' > /usr/local/bin/flutter
          chmod +x /usr/local/bin/flutter
          echo -e '#!/bin/bash\necho Dart 3.6.0' > /usr/local/bin/dart
          chmod +x /usr/local/bin/dart

      - name: Check Flutter & Dart version
        run: |
          flutter --version
          dart --version

      - run: npm ci --prefer-offline --no-audit --fund=false

      - name: npm audit (>= ${{ inputs.audit-level }})
        run: |
          level='${{ inputs.audit-level }}'
          case "$level" in
            low|moderate|high|critical) ;;
            *) echo "Invalid audit level: $level"; exit 1;;
          esac
          npm audit --audit-level="$level" || {
            echo "Vulnerabilities >= $level found"; exit 1;
          }

      - name: gitleaks
        if: ${{ env.ACT != 'true' }}
        uses: zricethezav/gitleaks-action@v2
        with:
          args: >
            dir .
            --config .gitleaks.toml
            --no-banner
            --redact
            --report-path gitleaks.sarif
            --report-format sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: gitleaks (local via act)
        if: ${{ env.ACT == 'true' }}
        run: |
          set -euo pipefail
          V=8.28.0
          curl -sSL -o /tmp/g.tgz https://github.com/gitleaks/gitleaks/releases/download/v${V}/gitleaks_${V}_linux_x64.tar.gz
          tar -xzf /tmp/g.tgz -C /tmp
          /tmp/gitleaks dir . \
            --config .gitleaks.toml \
            --no-banner \
            --redact \
            --report-path gitleaks.sarif \
            --report-format sarif

  smoke:
    runs-on: ubuntu-22.04
    needs: [validate, build, test, security]
    if: ${{ inputs.run-smoke-e2e }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter (stable channel)
        if: ${{ env.ACT != 'true' }}
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.35.6'
          cache: false

      - name: Mock Flutter setup (local act)
        if: ${{ env.ACT == 'true' }}
        run: |
          echo "Simulating Flutter setup under act"
          mkdir -p /usr/local/bin
          echo -e '#!/bin/bash\necho Flutter 3.35.6-stable' > /usr/local/bin/flutter
          chmod +x /usr/local/bin/flutter
          echo -e '#!/bin/bash\necho Dart 3.6.0' > /usr/local/bin/dart
          chmod +x /usr/local/bin/dart

      - name: Check Flutter & Dart version
        run: |
          flutter --version
          dart --version

      - name: Install Playwright browsers (ACT)
        if: ${{ env.ACT == 'true' }}
        run: npx playwright install --with-deps

      - name: Smoke E2E (placeholder)
        run: echo "Run smoke/e2e tests"
# TODO: Most likely this needs to be split into multiple files
name: Reusable CI

on:
  workflow_call:
    inputs:
        node-version:
            type: string
            default: '20.10.0'
        coverage-threshold:
            type: number
            default: 70
        run-build:
            type: boolean
            default: true
        run-heavy-lint:
            type: boolean
            default: false
        audit-level:
            type: string
            default: 'critical'
        run-security-checks:
            type: boolean
            default: true
        run-gitleaks:
            type: boolean
            default: false
        run-smoke-e2e:
            type: boolean
            default: false

jobs:
  gates:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      TURBO_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            apps/backend
            apps/web
            apps/mobile
            packages
            infra
            turbo.json
            package.json
            package-lock.yaml
            .nvmrc
            .turboignore
            .gitleaks.toml
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      # TODO: Needs to be defined
      - name: Generate OpenAPI & clients
        run: npm run openapi:check

      # TODO: return exit 1 once better way for checking this is implemented
      - name: Verify generated OpenAPI clients are committed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted OpenAPI/client changes detected. Commit the generated files."
            git status --porcelain
            exit 0
          fi

      - name: Lint (fast)
        run: npm run lint

      # TODO: Needs to be defined in packages/shared/package.json
      - name: Lint (heavy)
        if: ${{ inputs.run-heavy-lint }}
        run: npm run lint:heavy

        # https://github.com/vercel/next.js/discussions/47010
      - name: Create Next type shim for typecheck
        run: |
          set -eu
          f=apps/web/next-env.d.ts
          if [ ! -f "$f" ]; then
            printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > "$f"
          fi

      - name: Typecheck
        run: npm run typecheck

      # TODO: Split into building web and backend one at a time
      # TODO: Use docker containers?
      - name: Build
        if: ${{ inputs.run-build }}
        run: npm run build

      # TODO: Split into different tests for different targets mobile/web/backend
      # TODO: SPlit into different levels of tests unit/integration
      - name: Test
        run: npm run test

      # TODO: Implement once coverage reports available from backend and frontend
      - name: Enforce coverage gate (${{ inputs.coverage-threshold }}%)
        run: echo "Check test coverage"

      - name: npm audit (>= ${{ inputs.audit-level }})
        if: ${{ inputs.run-security-checks }}
        run: |
          level='${{ inputs.audit-level }}'
          case "$level" in
            low|moderate|high|critical) ;;
            *) echo "Invalid audit level: $level"; exit 1;;
          esac
          npm audit --audit-level="$level" || {
            echo "Vulnerabilities >= $level found"; exit 1;
          }

      - name: gitleaks
        if: ${{ inputs.run-security-checks && env.ACT != 'true' }}
        uses: zricethezav/gitleaks-action@v2
        with:
          args: >
            dir .
            --config .gitleaks.toml
            --no-banner
            --redact
            --report-path gitleaks.sarif
            --report-format sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: gitleaks (local via act)
        if: ${{ inputs.run-security-checks && env.ACT == 'true' }}
        uses: gitleaks/gitleaks@v8.28.0
        with:
          args: >
            dir .
            --config .gitleaks.toml
            --no-banner
            --redact
            --report-path gitleaks.sarif
            --report-format sarif

      # TODO: Add once archive process is resolved
      # - name: Upload SARIF to GitHub Security tab
      #   if: ${{ inputs.run-security-checks && env.ACT != 'true' }}
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: gitleaks.sarif

      # TODO: Add a command to run once somke tests exist
      - name: Smoke E2E (placeholder)
        if: ${{ inputs.run-smoke-e2e }}
        run: echo "Run smoke/e2e tests"